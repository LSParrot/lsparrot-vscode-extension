name: Publish VS Code Extension

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write
  id-token: write

jobs:
  Publish:
    name: Publish to Visual Studio Marketplace
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    defaults:
      run:
        shell: sh
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Resolve release version
        id: release
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if ! printf '%s\n' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release tag must be a numeric version tag without a v prefix." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "package_path=lsp-php-vscode-${VERSION}.vsix" >> "${GITHUB_OUTPUT}"
      - name: Set package version from tag
        run: npm version "${{ steps.release.outputs.version }}" --no-git-tag-version --allow-same-version --ignore-scripts
      - name: Install dependencies
        run: npm ci
      - name: Package extension
        run: npx @vscode/vsce package --allow-missing-repository --out "${{ steps.release.outputs.package_path }}"
      - name: Verify VSIX version
        env:
          PACKAGE_PATH: ${{ steps.release.outputs.package_path }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const yauzl = require('yauzl');

          function readZipEntry(zipPath, entryName) {
            return new Promise((resolve, reject) => {
              yauzl.open(zipPath, { lazyEntries: true }, (openError, zipfile) => {
                if (openError) {
                  reject(openError);
                  return;
                }

                zipfile.readEntry();
                zipfile.on('entry', (entry) => {
                  if (entry.fileName !== entryName) {
                    zipfile.readEntry();
                    return;
                  }

                  zipfile.openReadStream(entry, (streamError, stream) => {
                    const chunks = [];
                    if (streamError) {
                      reject(streamError);
                      return;
                    }

                    stream.on('data', (chunk) => chunks.push(chunk));
                    stream.on('error', reject);
                    stream.on('end', () => resolve(Buffer.concat(chunks).toString('utf8')));
                  });
                });
                zipfile.on('end', () => reject(new Error(`${entryName} was not found in ${zipPath}.`)));
                zipfile.on('error', reject);
              });
            });
          }

          (async () => {
            const releaseVersion = process.env.RELEASE_VERSION;
            const packagePath = process.env.PACKAGE_PATH;
            const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const vsixPackageJson = JSON.parse(await readZipEntry(packagePath, 'extension/package.json'));

            if (packageJson.version !== releaseVersion) {
              throw new Error(`package.json version ${packageJson.version} does not match release tag ${releaseVersion}.`);
            }

            if (vsixPackageJson.version !== releaseVersion) {
              throw new Error(`VSIX version ${vsixPackageJson.version} does not match release tag ${releaseVersion}.`);
            }
          })().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE
      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG=""
          LAST_TAG=""
          RELEASE_TAGS_FILE="${RUNNER_TEMP:-.}/release-tags.txt"

          git tag --list "[0-9]*.[0-9]*.[0-9]*" --sort=v:refname |
            grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' > "${RELEASE_TAGS_FILE}" || true

          while IFS= read -r TAG; do
            if test "${TAG}" = "${CURRENT_TAG}"; then
              PREVIOUS_TAG="${LAST_TAG}"
              break
            fi
            LAST_TAG="${TAG}"
          done < "${RELEASE_TAGS_FILE}"

          rm -f "${RELEASE_TAGS_FILE}"

          if test -n "${PREVIOUS_TAG}"; then
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
            CHANGES="$(git log "${RANGE}" --pretty=format:'- %s (%h)')"
          else
            CHANGES="$(git log "${CURRENT_TAG}" --pretty=format:'- %s (%h)')"
          fi

          {
            echo "## Changes"
            echo
            if test -n "${PREVIOUS_TAG}"; then
              echo "Changes since ${PREVIOUS_TAG}:"
            else
              echo "Changes included in this release:"
            fi
            echo
            if test -n "${CHANGES}"; then
              printf '%s\n' "${CHANGES}"
            else
              echo "- No commit changes found."
            fi
          } > release-notes.md

          echo "previous_tag=${PREVIOUS_TAG}" >> "${GITHUB_OUTPUT}"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_PATH: ${{ steps.release.outputs.package_path }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "${TAG}" > /dev/null 2>&1; then
            gh release edit "${TAG}" --title "${TAG}" --notes-file release-notes.md
            gh release upload "${TAG}" "${PACKAGE_PATH}" --clobber
          else
            gh release create "${TAG}" "${PACKAGE_PATH}" --title "${TAG}" --notes-file release-notes.md --verify-tag
          fi
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Verify Marketplace credential
        run: npx @vscode/vsce verify-pat "$(node -p "require('./package.json').publisher")" --azure-credential
      - name: Publish extension
        run: |
          npx @vscode/vsce publish --azure-credential --packagePath "${{ steps.release.outputs.package_path }}" --skip-duplicate --allow-missing-repository
